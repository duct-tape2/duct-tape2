name: Paid Product Or Service Inquiry
description: Ask a public-safe question after, before, or during payment for a paid offer.
title: "[PAID INQUIRY] "
labels: ["paid-inquiry"]
body:
  - type: markdown
    attributes:
      value: |
        Use this public-safe form for paid product, review, or service questions.

        Live checkout and request links:
        - $5 free tools thank-you tip: https://payhip.com/b/0LKEF
        - $9 Shorts Item Generator Starter: https://payhip.com/b/aUOu1
        - $19 Storefront Starter: https://payhip.com/b/KN6XS
        - $19 Anki Deck Builder Kit: https://payhip.com/b/cSObV
        - $25 AI Money Stack: https://payhip.com/b/RJ63W
        - $29 Japanese Anki Pack: https://payhip.com/b/D0mhb
        - $39 Repo-to-Revenue Launch Bundle: https://payhip.com/b/qHsNi
        - $49 Storefront Review request: https://github.com/duct-tape2/github-pages-storefront-starter/issues/new?template=paid-storefront-review.yml
        - $49 Anki Deck Review request: https://github.com/duct-tape2/japanese-anki-pack/issues/new?template=paid-deck-review.yml
        - $99 Repo-to-Revenue Setup: https://payhip.com/b/ZOl1I
        - $99 Anki Deck Packaging: https://payhip.com/b/lytaz

        Full catalog: https://duct-tape2.github.io/offers.json
        Direct checkout: https://duct-tape2.github.io/buy/

        Payhip delivers digital products automatically. For services, follow the listing intake instructions. The $49 reviews start with a public-safe request before payment.

        Do not post full transaction IDs, payment screenshots, private files, customer data, passwords, API keys, private analytics, or private URLs in this public issue.
  - type: dropdown
    id: offer
    attributes:
      label: Offer
      options:
        - $5 Free Tools Thank-You Tip
        - $9 Shorts Item Generator Starter
        - $19 GitHub Pages Storefront Starter
        - $19 Anki Deck Builder Kit
        - $25 AI Money Stack
        - $29 Japanese Anki Pack
        - $39 Repo-to-Revenue Launch Bundle
        - $49 Storefront Review
        - $49 Anki Deck Review
        - $99 Repo-to-Revenue Setup
        - $99 Anki Deck Packaging
        - Not sure yet
    validations:
      required: true
  - type: dropdown
    id: payment-status
    attributes:
      label: Payment status
      options:
        - Asking before payment
        - Paid through Payhip
        - Review request submitted before payment
        - Need a different checkout link
        - Need help choosing an offer
    validations:
      required: true
  - type: textarea
    id: public-context
    attributes:
      label: Public-safe context
      description: Share only public links or a short public-safe summary.
      placeholder: "Public page/repo URL, what you want reviewed or packaged, and the outcome you want."
    validations:
      required: true
  - type: textarea
    id: delivery
    attributes:
      label: Delivery note
      description: Write "emailed" if you already sent private delivery details.
      placeholder: "emailed / will email after payment / public answer is enough"
    validations:
      required: false
